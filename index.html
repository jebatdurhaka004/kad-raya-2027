<!DOCTYPE html>
<html lang="ms">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kad Raya Digital</title>

<style>

body{
font-family:sans-serif;
margin:0;
background:linear-gradient(135deg,#065f46,#022c22);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
color:black;
padding:25px;
border-radius:15px;
width:330px;
text-align:center;
}

input,textarea{
width:90%;
padding:10px;
margin-top:8px;
border-radius:8px;
border:1px solid #ccc;
}

button{
margin-top:15px;
padding:12px 20px;
background:#16a34a;
border:none;
color:white;
border-radius:10px;
font-size:16px;
}

</style>

</head>

<body>

<div class="container">

<h2>🌙 Kad Raya Digital</h2>

<input id="penerima" placeholder="Nama penerima">

<input id="pengirim" placeholder="Nama pengirim">

<textarea id="ucapan" placeholder="Tulis ucapan raya anda"></textarea>

<button onclick="buatKad()">Buat Kad Raya</button>

</div>

<script>

function buatKad(){

let penerima=document.getElementById("penerima").value
let pengirim=document.getElementById("pengirim").value
let ucapan=document.getElementById("ucapan").value

let mesej =
"🌙 Selamat Hari Raya "+penerima+
"%0A%0A"+ucapan+
"%0A%0AIkhlas daripada: "+pengirim

let url="https://wa.me/?text="+mesej

window.open(url)

}

</script>

</body>
</html>
